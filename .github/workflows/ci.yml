name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Bash
      run: |
        chmod +x monitor.sh
        chmod +x scripts/*.sh
    
    - name: Run monitor
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: ./monitor.sh || true
    
    - name: Validate JSON output
      run: |
        cat /tmp/devops_security_report.json | jq empty
    
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: /tmp/devops_security_report.json

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'HIGH,CRITICAL'
        exit-code: '1'
